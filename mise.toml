[settings]
lockfile = true

[tool_alias]
z3 = "github:Z3Prover/z3"

[tools]
node = "22.22.2"
uv = "0.11.29"
solidity = "0.8.35"
osv-scanner = "2.4.0"
lefthook = "2.1.10"

[tools.z3]
version = "z3-4.15.8"

[tools.z3.platforms]
linux-x64 = { asset_pattern = "z3-*-x64-glibc-2.39.zip" }
macos-x64 = { asset_pattern = "z3-*-x64-osx-*.zip" }
macos-arm64 = { asset_pattern = "z3-*-arm64-osx-*.zip" }

[tasks.setup]
description = "Install pinned tools, JavaScript dependencies, and local Git hooks"
run = [
  "yarn install --frozen-lockfile",
  "lefthook install",
]

[tasks.check]
description = "Run the normal local and pull-request checks"
run = [
  "yarn typecheck",
  "yarn format",
  "yarn lint",
  "yarn test:v2",
  "yarn validate:upgrades",
]

[tasks."security:static"]
description = "Run blocking static, standards, dependency, and artifact checks"
run = [
  "yarn analyze:slither",
  "yarn analyze:standards",
  "yarn security:dependencies",
  "yarn security:artifacts",
]

[tasks."security:deep"]
description = "Run the manual deep fuzz/invariant, scale, and coverage gates"
run = [
  "yarn test:v2:deep",
  "yarn test:v2:scale",
  "yarn security:coverage",
]
