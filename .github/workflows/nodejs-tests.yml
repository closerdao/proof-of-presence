name: contracts

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Additional security suite to run
        required: true
        default: standard
        type: choice
        options:
          - standard
          - deep
          - preaudit
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: contracts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and contract tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned toolchain
        uses: jdx/mise-action@v3
        with:
          version: 2026.6.14
          install: true
          cache: true

      - name: Install JavaScript dependencies
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Type checking
        run: yarn typecheck

      - name: Formatting
        run: yarn format

      - name: Linting
        run: yarn lint

      - name: Contract tests
        run: yarn test

      - name: Validate UUPS upgrades and storage layouts
        run: yarn validate:upgrades

  security:
    name: Static security gates
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned toolchain
        uses: jdx/mise-action@v3
        with:
          version: 2026.6.14
          install: true
          cache: true

      - name: Install JavaScript dependencies
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Slither medium/high gate
        run: yarn analyze:slither

      - name: ERC conformance checks
        run: yarn analyze:standards

      - name: TokenizedStays formal verification
        run: yarn analyze:smt

      - name: Dependency vulnerability regression gate
        run: yarn security:dependencies

      - name: ABI, storage fingerprint, and code-size gate
        run: yarn security:artifacts

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: security-reports/
          if-no-files-found: warn

  deep:
    name: Deep fuzz, invariant, and coverage
    if: github.event_name == 'workflow_dispatch' && (inputs.suite == 'deep' || inputs.suite == 'preaudit')
    needs: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned toolchain
        uses: jdx/mise-action@v3
        with:
          version: 2026.6.14
          install: true
          cache: true

      - name: Install JavaScript dependencies
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Deep fuzz and invariant tests
        run: yarn test:deep

      - name: Coverage regression gate
        run: yarn security:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-coverage
          path: coverage/
          if-no-files-found: warn

  preaudit:
    name: Independent pre-audit analyzers
    if: github.event_name == 'workflow_dispatch' && inputs.suite == 'preaudit'
    needs: deep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned toolchain
        uses: jdx/mise-action@v3
        with:
          version: 2026.6.14
          install: true
          cache: true

      - name: Install JavaScript dependencies
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Prepare report directories
        run: mkdir -p security-reports/aderyn security-reports/wake security-reports/gambit

      - name: Aderyn independent detector pass
        run: mise run security:aderyn

      - name: Wake independent detector pass
        run: mise run security:wake

      - name: Generate and test deterministic targeted mutants
        run: mise run security:gambit

      - name: Upload pre-audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preaudit-reports
          path: security-reports/
          if-no-files-found: warn
